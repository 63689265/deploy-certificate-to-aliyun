name: Auto Renew and Deploy SSL Certificates

on:
  workflow_dispatch:  # 支持手动触发
  schedule:
    - cron: '0 0 20 */2 *' # 每两个月的第二十天执行一次

# 最小权限原则：仅授予读取仓库代码的权限
permissions:
  contents: read

jobs:
  renew-deploy-cert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4     # 升级到 v4（v2 已停止维护，存在安全风险）

    - name: Set up Python
      uses: actions/setup-python@v5  # 升级到 v5（v2 已停止维护）
      with:
        python-version: '3.12'      # 升级到 3.12（3.8 已于 2024年10月 EOL）

    - name: Install acme.sh
      env:
        EMAIL: ${{ secrets.EMAIL }}
      run: |
        set -e
        sudo apt-get update
        sudo apt-get install -y socat
        # clone 到临时目录再安装到 ~/.acme.sh，避免 cp 同路径冲突
        git clone --depth 1 https://github.com/acmesh-official/acme.sh.git /tmp/acme.sh
        cd /tmp/acme.sh
        ./acme.sh --install --home ~/.acme.sh --email "${EMAIL}"
        rm -rf /tmp/acme.sh
        # 验证安装成功
        ~/.acme.sh/acme.sh --version

    - name: Prepare acme.sh credentials
      run: |
        mkdir -p ~/.acme.sh
        IFS=',' read -r -a domain_array <<< "${{ secrets.DOMAINS }}"
        for domain in "${domain_array[@]}"; do
          mkdir -p ~/certs/${domain}
        done

    - name: Obtain SSL Certificates
      env:
        DOMAINS: ${{ secrets.DOMAINS }}
        DP_Id: ${{ secrets.DNSPOD_ID }}
        DP_Key: ${{ secrets.DNSPOD_KEY }}
      run: |
        IFS=',' read -r -a domain_array <<< "${DOMAINS}"
        for domain in "${domain_array[@]}"; do
          ~/.acme.sh/acme.sh --issue --dns dns_dp -d "*.${domain}" \
          --key-file ~/certs/${domain}/privkey.pem --fullchain-file ~/certs/${domain}/fullchain.pem \
          --debug 2
        done


    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Upload certificates to Alibaba Cloud CDN
      env:
        ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
        ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        # 要设置域名的二级域名，例如要设置*.example.com，这里填写的就是example.com, 多个域名用英文逗号隔开
        DOMAINS: ${{ secrets.DOMAINS }}
        # 设置阿里云cdn域名，一般是三级域名，例如cdn.example.com，需要跟上面的DOMAINS对应，否则会设置错误
        ALIYUN_CDN_DOMAINS: ${{ secrets.ALIYUN_CDN_DOMAINS }}

      run: python upload_certs_to_aliyun.py

    - name: Clean up
      env:
        DOMAINS: ${{ secrets.DOMAINS }}
      run: |
        IFS=',' read -r -a domain_array <<< "${DOMAINS}"
        for domain in "${domain_array[@]}"; do
          rm -rf ~/certs/${domain}
        done